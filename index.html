<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor English - 最短コースで合格へ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #f8fafc;
        }

        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .quiz-option:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow-2xl relative flex flex-col overflow-hidden">
        
        <!-- Onboarding Screen -->
        <div id="onboarding" class="flex-1 flex flex-col justify-center p-8 text-center animate-fade-in">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto flex items-center justify-center text-white shadow-xl rotate-3 mb-8">
                <i class="fas fa-book-open text-4xl"></i>
            </div>
            <h1 class="text-3xl font-black text-blue-900 tracking-tight mb-2">Anchor English</h1>
            <p class="text-gray-500 font-medium mb-12">最短コースで合格へ</p>
            
            <div class="space-y-4">
                <button onclick="selectUserType('middle')" class="w-full group p-6 border-2 border-slate-100 rounded-3xl hover:border-blue-500 hover:bg-blue-50 transition-all text-left flex items-center gap-4">
                    <div class="bg-slate-100 p-3 rounded-2xl group-hover:bg-blue-200">
                        <i class="fas fa-school text-2xl text-slate-600 group-hover:text-blue-700"></i>
                    </div>
                    <div>
                        <p class="font-bold text-lg">中学生</p>
                        <p class="text-xs text-gray-400">高校受験・基礎固め</p>
                    </div>
                    <i class="fas fa-chevron-right ml-auto text-slate-300 group-hover:text-blue-500"></i>
                </button>

                <button onclick="selectUserType('high')" class="w-full group p-6 border-2 border-slate-100 rounded-3xl hover:border-blue-500 hover:bg-blue-50 transition-all text-left flex items-center gap-4">
                    <div class="bg-slate-100 p-3 rounded-2xl group-hover:bg-blue-200">
                        <i class="fas fa-graduation-cap text-2xl text-slate-600 group-hover:text-blue-700"></i>
                    </div>
                    <div>
                        <p class="font-bold text-lg">高校生・既卒生</p>
                        <p class="text-xs text-gray-400">大学受験・難関突破</p>
                    </div>
                    <i class="fas fa-chevron-right ml-auto text-slate-300 group-hover:text-blue-500"></i>
                </button>
            </div>
        </div>

        <!-- Main Content (Initially Hidden) -->
        <div id="main-content" class="hidden flex-1 flex flex-col h-screen overflow-hidden">
            <!-- Top Bar -->
            <div class="p-4 bg-white border-b flex justify-between items-center shrink-0">
                <span id="header-title" class="font-bold text-blue-900">Home</span>
                <div class="flex items-center gap-2">
                    <span id="streak-count" class="text-xs font-bold bg-orange-100 text-orange-600 px-2 py-1 rounded-full">🔥 45日</span>
                </div>
            </div>

            <!-- Content Area -->
            <div id="scroll-area" class="flex-1 overflow-y-auto p-4 pb-24 space-y-6">
                <!-- Tabs will be rendered here -->
            </div>

            <!-- Bottom Navigation -->
            <div class="absolute bottom-0 left-0 right-0 glass-effect border-t border-gray-100 px-6 py-3 flex justify-between items-center shadow-lg z-50 safe-area-bottom">
                <button onclick="switchTab('home')" id="tab-home" class="flex flex-col items-center gap-1 text-blue-600 transition-colors">
                    <i class="fas fa-home text-xl"></i>
                    <span class="text-[10px] font-bold">ホーム</span>
                </button>
                <button onclick="startLesson()" class="flex flex-col items-center gap-1 text-gray-400 transition-colors">
                    <i class="fas fa-book-open text-xl"></i>
                    <span class="text-[10px] font-bold">学習</span>
                </button>
                <button onclick="switchTab('chat')" id="tab-chat" class="flex flex-col items-center gap-1 text-gray-400 transition-colors">
                    <i class="fas fa-comment-dots text-xl"></i>
                    <span class="text-[10px] font-bold">AI相談</span>
                </button>
                <button onclick="switchTab('stats')" id="tab-stats" class="flex flex-col items-center gap-1 text-gray-400 transition-colors">
                    <i class="fas fa-chart-bar text-xl"></i>
                    <span class="text-[10px] font-bold">記録</span>
                </button>
            </div>
        </div>

        <!-- Quiz Overaly (Fullscreen) -->
        <div id="quiz-overlay" class="hidden absolute inset-0 bg-white z-[100] flex flex-col animate-fade-in">
            <!-- Quiz contents managed by JS -->
        </div>
    </div>

    <script>
        // State Management
        let userType = null;
        let currentTab = 'home';
        let timerSeconds = 900; // 15 min
        let timerInterval = null;
        let isTimerRunning = false;

        const mockQuestions = {
            high: [
                {
                    q: "If it (  ) rain tomorrow, the game would be postponed.",
                    options: ["will", "is to", "were to", "should"],
                    answer: 2,
                    explain: "仮定法未来「万一〜ならば」を表す were to が適切です。主節が would be なので were to が自然です。"
                },
                {
                    q: "The man (  ) I thought was a doctor turned out to be a lawyer.",
                    options: ["whom", "who", "which", "whose"],
                    answer: 1,
                    explain: "「I thought」は挿入節です。(  ) は turned out の主語になるため、主格の who が正解です。"
                }
            ],
            middle: [
                {
                    q: "I (  ) lunch when the phone rang.",
                    options: ["ate", "am eating", "was eating", "eat"],
                    answer: 2,
                    explain: "「電話が鳴ったとき〜していた」という過去の進行中の動作を表すので、過去進行形にします。"
                }
            ]
        };

        // Initialize App
        function selectUserType(type) {
            userType = type;
            document.getElementById('onboarding').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            renderHome();
        }

        function switchTab(tab) {
            currentTab = tab;
            const scrollArea = document.getElementById('scroll-area');
            const tabs = ['home', 'chat', 'stats'];
            
            // UI Update for navigation icons
            tabs.forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if (el) {
                    el.classList.remove('text-blue-600');
                    el.classList.add('text-gray-400');
                }
            });
            document.getElementById(`tab-${tab}`).classList.add('text-blue-600');
            document.getElementById(`tab-${tab}`).classList.remove('text-gray-400');

            if (tab === 'home') renderHome();
            if (tab === 'chat') renderChat();
            if (tab === 'stats') renderStats();
        }

        // --- Tab Renderers ---

        function renderHome() {
            const examDays = userType === 'high' ? 85 : 95;
            const examLabel = userType === 'high' ? '共通テスト' : '高校入試';

            document.getElementById('scroll-area').innerHTML = `
                <div class="space-y-6 animate-fade-in">
                    <!-- Countdown -->
                    <div class="bg-gradient-to-br from-blue-50 to-indigo-50 border border-blue-100 p-5 rounded-3xl relative overflow-hidden">
                        <div class="relative z-10">
                            <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-1">
                                <i class="fas fa-calendar-alt mr-1"></i> ${examLabel} まで
                            </p>
                            <p class="text-gray-800 font-medium">あと <span class="text-4xl font-black text-blue-600">${examDays}</span> 日</p>
                        </div>
                        <i class="fas fa-graduation-cap absolute -right-4 -bottom-4 text-8xl text-blue-500 opacity-5"></i>
                    </div>

                    <!-- Timer Widget -->
                    <div class="bg-slate-900 p-6 rounded-3xl text-white shadow-xl">
                        <div class="flex items-center justify-between mb-6">
                            <span class="text-xs font-bold text-blue-400 tracking-wider">SHORT FOCUS TIMER</span>
                            <span class="text-[10px] bg-blue-500/20 text-blue-300 px-2 py-0.5 rounded-full border border-blue-500/30">最短目標設定</span>
                        </div>
                        <div class="flex items-center justify-center gap-8 mb-6">
                            <button onclick="adjustTimer(-300)" class="w-10 h-10 flex items-center justify-center hover:bg-white/10 rounded-full text-slate-400 transition-colors"><i class="fas fa-minus"></i></button>
                            <p id="timer-display" class="text-5xl font-mono font-bold tracking-widest">${formatTime(timerSeconds)}</p>
                            <button onclick="adjustTimer(300)" class="w-10 h-10 flex items-center justify-center hover:bg-white/10 rounded-full text-slate-400 transition-colors"><i class="fas fa-plus"></i></button>
                        </div>
                        <button onclick="toggleTimer()" id="timer-btn" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all active:scale-95 shadow-lg shadow-blue-900/40">
                            <i class="fas fa-play"></i> 集中を開始
                        </button>
                    </div>

                    <!-- Action Card -->
                    <div class="bg-white border-2 border-blue-100 rounded-3xl p-6 shadow-sm text-center space-y-4">
                        <h2 class="text-lg font-bold text-gray-800">今日の最短タスク</h2>
                        <p class="text-sm text-gray-500">10分で終わる重要ポイントの総復習</p>
                        <button onclick="startLesson()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg hover:brightness-110 shadow-md active:scale-95 transition-all">
                            学習をスタート
                        </button>
                    </div>
                </div>
            `;
            updateTimerUI();
        }

        function renderChat() {
            document.getElementById('scroll-area').innerHTML = `
                <div class="flex flex-col h-full animate-fade-in">
                    <div class="flex-1 space-y-4 mb-20" id="chat-box">
                        <div class="flex justify-start">
                            <div class="bg-white border border-slate-100 p-4 rounded-2xl rounded-bl-none text-sm text-slate-700 shadow-sm max-w-[85%]">
                                こんにちは！わからないことがあれば何でも聞いてください。最短で解決します！
                            </div>
                        </div>
                    </div>
                    <div class="fixed bottom-[72px] left-0 right-0 p-4 bg-white/80 backdrop-blur border-t max-w-md mx-auto">
                        <div class="flex gap-2">
                            <input type="text" id="chat-input" placeholder="質問を入力..." class="flex-1 bg-slate-100 border-none rounded-xl py-3 px-4 text-sm outline-none">
                            <button onclick="sendMessage()" class="bg-blue-600 text-white w-12 h-12 flex items-center justify-center rounded-xl shadow-md active:scale-90 transition-all">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderStats() {
            document.getElementById('scroll-area').innerHTML = `
                <div class="space-y-6 animate-fade-in text-left">
                    <h2 class="text-xl font-bold text-gray-800">学習記録</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm text-center">
                            <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">正答率</p>
                            <p class="text-2xl font-black text-green-600">72.4%</p>
                        </div>
                        <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm text-center">
                            <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">演習数</p>
                            <p class="text-2xl font-black text-blue-600">1,240</p>
                        </div>
                    </div>
                    
                    <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                        <p class="text-sm font-bold text-gray-800 mb-4">週間学習ペース</p>
                        <div class="flex items-end justify-between h-32 gap-2">
                            ${[40, 60, 30, 90, 50, 80, 20].map((h, i) => `
                                <div class="flex-1 bg-blue-100 rounded-t-lg relative group" style="height: ${h}%">
                                    <div class="opacity-0 group-hover:opacity-100 absolute -top-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-[10px] py-1 px-2 rounded whitespace-nowrap transition-opacity">
                                        ${(h/10).toFixed(1)}h
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="flex justify-between mt-2 text-[10px] text-gray-400 font-bold">
                            <span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span><span>日</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- Functionality ---

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function adjustTimer(amt) {
            timerSeconds = Math.max(300, timerSeconds + amt); // Min 5 min
            updateTimerUI();
        }

        function toggleTimer() {
            const btn = document.getElementById('timer-btn');
            if (isTimerRunning) {
                clearInterval(timerInterval);
                btn.innerHTML = '<i class="fas fa-play"></i> 集中を開始';
                btn.classList.remove('bg-red-500/20', 'text-red-400', 'border', 'border-red-500/30');
                btn.classList.add('bg-blue-600', 'text-white');
            } else {
                timerInterval = setInterval(() => {
                    if (timerSeconds > 0) {
                        timerSeconds--;
                        updateTimerUI();
                    } else {
                        toggleTimer();
                        alert('集中終了！お疲れ様でした。');
                    }
                }, 1000);
                btn.innerHTML = '<i class="fas fa-pause"></i> 中断する';
                btn.classList.add('bg-red-500/20', 'text-red-400', 'border', 'border-red-500/30');
                btn.classList.remove('bg-blue-600', 'text-white');
            }
            isTimerRunning = !isTimerRunning;
        }

        function updateTimerUI() {
            const display = document.getElementById('timer-display');
            if (display) display.innerText = formatTime(timerSeconds);
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const box = document.getElementById('chat-box');
            if (!input.value.trim()) return;

            const userMsg = `<div class="flex justify-end"><div class="bg-blue-600 p-4 rounded-2xl rounded-br-none text-sm text-white shadow-md max-w-[85%]">${input.value}</div></div>`;
            box.innerHTML += userMsg;
            const val = input.value;
            input.value = '';

            setTimeout(() => {
                const aiMsg = `<div class="flex justify-start animate-fade-in"><div class="bg-white border border-slate-100 p-4 rounded-2xl rounded-bl-none text-sm text-slate-700 shadow-sm max-w-[85%]">「${val}」についてですね。最短で理解するコツは、まず基本構造を掴むことです。</div></div>`;
                box.innerHTML += aiMsg;
                box.scrollTop = box.scrollHeight;
            }, 800);
        }

        // --- Quiz System ---

        let currentQuestionIdx = 0;

        function startLesson() {
            currentQuestionIdx = 0;
            const overlay = document.getElementById('quiz-overlay');
            overlay.classList.remove('hidden');
            renderQuizPage();
        }

        function renderQuizPage() {
            const questions = mockQuestions[userType];
            const q = questions[currentQuestionIdx];
            const progress = ((currentQuestionIdx + 1) / questions.length) * 100;

            document.getElementById('quiz-overlay').innerHTML = `
                <div class="p-4 border-b flex items-center justify-between">
                    <button onclick="closeQuiz()" class="text-slate-400"><i class="fas fa-times text-xl"></i></button>
                    <div class="flex-1 mx-6 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-600 transition-all duration-500" style="width: ${progress}%"></div>
                    </div>
                    <span class="text-xs font-bold text-blue-600">${currentQuestionIdx + 1}/${questions.length}</span>
                </div>
                <div class="flex-1 p-6 space-y-8 overflow-y-auto">
                    <div class="space-y-4">
                        <span class="px-2 py-0.5 bg-blue-100 text-blue-700 text-[10px] font-bold rounded">GRAMMAR</span>
                        <h3 class="text-xl font-bold leading-relaxed text-slate-800">${q.q}</h3>
                    </div>
                    <div class="grid gap-3" id="quiz-options">
                        ${q.options.map((opt, i) => `
                            <button onclick="checkAnswer(${i})" class="quiz-option w-full p-4 border-2 border-slate-100 hover:border-blue-200 bg-white rounded-2xl text-left font-bold text-slate-700 transition-all flex justify-between items-center shadow-sm">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                    <div id="quiz-explain" class="hidden animate-fade-in space-y-4">
                        <div class="bg-blue-50 border border-blue-100 p-5 rounded-3xl">
                            <p class="text-xs font-black text-blue-600 mb-2 uppercase"><i class="fas fa-lightbulb mr-1"></i> 短縮解説</p>
                            <p class="text-sm text-slate-600 leading-relaxed">${q.explain}</p>
                        </div>
                        <button onclick="nextQuestion()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold flex items-center justify-center gap-2">
                            ${currentQuestionIdx === questions.length - 1 ? '完了する' : '次の問題へ'} <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        function checkAnswer(idx) {
            const questions = mockQuestions[userType];
            const q = questions[currentQuestionIdx];
            const options = document.querySelectorAll('.quiz-option');
            
            options.forEach((btn, i) => {
                btn.disabled = true;
                if (i === q.answer) {
                    btn.classList.add('border-green-500', 'bg-green-50', 'text-green-700');
                    btn.innerHTML += '<i class="fas fa-check-circle text-green-500"></i>';
                } else if (i === idx) {
                    btn.classList.add('border-red-500', 'bg-red-50', 'text-red-700');
                    btn.innerHTML += '<i class="fas fa-times-circle text-red-500"></i>';
                } else {
                    btn.classList.add('opacity-40');
                }
            });

            document.getElementById('quiz-explain').classList.remove('hidden');
        }

        function nextQuestion() {
            const questions = mockQuestions[userType];
            if (currentQuestionIdx < questions.length - 1) {
                currentQuestionIdx++;
                renderQuizPage();
            } else {
                closeQuiz();
            }
        }

        function closeQuiz() {
            document.getElementById('quiz-overlay').classList.add('hidden');
        }

    </script>
</body>
</html>
